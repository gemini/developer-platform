              example:
                message: "0x0000000000000000000000000000000000000000 removed from group pending-time approved addresses."
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/ApiKeyIpFilteringFailure'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalError'

  /v1/account/create:
    post:
      x-zudoku-playground-enabled: false
      tags:
        - Account Administration
      summary: Create New Account
      operationId: createNewAccount
      description: |
        A Master API key can create a new exchange account within the group. This API will return the name of your new account for use with the account parameter in when using Master API keys to perform account level functions. Please see the [example](/account-admin-endpoints#using-master-api-keys).

        ### Roles
        The API key you use to access this endpoint must be a Master level key and have the Administrator role assigned. See [Roles](/roles#roles) for more information.
      parameters:
        - $ref: '#/components/parameters/apiKeyAuth'
        - $ref: '#/components/parameters/signatureAuth'
        - $ref: '#/components/parameters/payloadAuth'
        - $ref: '#/components/parameters/contentType'
        - $ref: '#/components/parameters/contentLength'
        - $ref: '#/components/parameters/cacheControl'
        
      security:
        - apiKeyAuth: []
          signatureAuth: []
          payloadAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - request
                - nonce
                - name
              properties:
                request:
                  type: string
                  description: The literal string "/v1/account/create"
                nonce:
                  $ref: '#/components/schemas/Nonce'
                name:
                  type: string
                  description:  A unique name for the new account
                type:
                  type: string
                  description: Either `exchange` or `custody` is accepted. Will generate an exchange account if `exchange` or parameter is missing. Will generate a custody account if `custody`.
            examples:
              createAccount:
                summary: Create Account Example
                description: JSON payload to create a new account
                value:
                  request: "/v1/account/create"
                  nonce: <nonce>
