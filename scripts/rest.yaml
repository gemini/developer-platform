                  address: "0x31c2105b8dea834167f32f7ea7d877812e059230"
                  amount: "0.01"
              usdcOnSolana:
                summary: USDC on Solana
                description: Estimate withdrawal fee for USDC on Solana network
                value:
                  request: "/v2/withdraw/solana/usdc/feeEstimate"
                  nonce: <nonce>
                  address: "7EcDhSYGxXyscszYEp35KHN8vvw3svAuLKTzXwCFLtV"
                  amount: "100"
              btcOnBitcoin:
                summary: BTC on Bitcoin
                description: Estimate withdrawal fee for BTC on Bitcoin network
                value:
                  request: "/v2/withdraw/bitcoin/btc/feeEstimate"
                  nonce: <nonce>
                  address: "mi98Z9brJ3TgaKsmvXatuRahbFRUFKRUdR"
                  amount: "0.5"
      responses:
        '200':
          description: Successful fee estimation response
          content:
