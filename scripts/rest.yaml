            example:
              request: "/v1/perpetuals/fundingPayment"
              nonce: <nonce>
      responses:
        '200':
          description: The response will be an array of funding payment objects.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FundingPayment'
              example:
                - eventType: "Hourly Funding Transfer"
                  hourlyFundingTransfer:
                    eventType: "Hourly Funding Transfer"
                    timestamp: 1683730803940
                    assetCode: "GUSD"
                    action: "Debit"
                    quantity:
                      currency: "GUSD"
                      value: "4.78958"
                - eventType: "Hourly Funding Transfer"
                  hourlyFundingTransfer:
                    eventType: "Hourly Funding Transfer"
                    timestamp: 1683734406746
                    assetCode: "GUSD"
                    action: "Debit"
                    quantity:
                      currency: "GUSD"
                      value: "4.78958"
                    instrumentSymbol: "BTCGUSDPERP"

  /v1/perpetuals/fundingpaymentreport/records.xlsx:
    get:
      x-zudoku-playground-enabled: false
      tags:
        - Derivatives
      summary: Get Funding Payment Report File
      operationId: getFundingPaymentReportFile
      description: |
        ### Roles
        The API key you use to access this endpoint must have the Trader or Auditor role assigned. See <a href="/roles#roles">Roles</a> for more information.

        The OAuth scope must have `orders:read` assigned to access this endpoint. See [OAuth Scopes](/authentication/oauth#oauth-scopes) for more information.

        ### Examples
        - `&fromDate=2024-04-10&toDate=2024-04-25&numRows=1000` </br>
          Compare and obtain the minimum records between (2024-04-10 to 2024-04-25) and 1000. If (2024-04-10 to 2024-04-25) contains 360 records. Then fetch the minimum between 360 and 1000 records only.

        - `&numRows=2024-04-10&toDate=2024-04-25` </br>
          If (2024-04-10 to 2024-04-25) contains 360 records. Then fetch 360 records only.

        - `&numRows=1000` </br>
          Fetch maximum 1000 records starting from Now to a historical date

        - `<blank>` </br>
          Fetch maximum 8760 records starting from Now to a historical date
      parameters:
        - name: fromDate
          in: query
          description: If empty, will only fetch records by numRows value.
          required: false
          schema:
            type: string
            format: date
        - name: toDate
          in: query
          description: If empty, will only fetch records by numRows value.
          required: false
          schema:
            type: string
            format: date
        - name: numRows
          in: query
          description: If empty, default value '8760'
          required: false
          schema:
            type: integer
        - $ref: '#/components/parameters/apiKeyAuth'
        - $ref: '#/components/parameters/signatureAuth'
        - $ref: '#/components/parameters/payloadAuth'
        - $ref: '#/components/parameters/contentType'
        - $ref: '#/components/parameters/contentLength'
        - $ref: '#/components/parameters/cacheControl'
        
      security:
        - apiKeyAuth: []
          signatureAuth: []
          payloadAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - request
                - nonce
              properties:
                request:
                  type: string
                  description: The API endpoint path
                  example: /v1/perpetuals/fundingpaymentreport/records.xlsx
                nonce:
                  type: TimestampType
                  $ref: '#/components/schemas/TimestampType'
                  title: The nonce, as described in [Private API Invocation](/authentication/api-key#private-api-invocation)
                account:
                  type: string
                  description: "Required for Master API keys as described in [Private API Invocation](/authentication/api-key#private-api-invocation). The name of the account within the subaccount group. Specifies the account on which you intend to place the order. Only available for exchange accounts."
                  example: primary
            example:
              request: "/v1/perpetuals/fundingpaymentreport/records.xlsx?fromDate=2024-04-10&toDate=2024-04-25&numRows=1000"
              nonce: <nonce>
      responses:
        '200':
          description: XLSX file downloaded containing funding payment report.
          headers:
            Content-Disposition:
              schema:
                type: string
                example: attachment; filename=FundingPayment_Report.xlsx
          content:
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalError'

  /v1/perpetuals/fundingpaymentreport/records.json:
    post:
      x-zudoku-playground-enabled: false
      tags:
        - Derivatives
      summary: Get Funding Payment Report JSON
      operationId: getFundingPaymentReportJson
      description: |
        This endpoint retrieves funding payment report in JSON format.

        ### Examples
        - `&fromDate=2024-04-10&toDate=2024-04-25&numRows=1000` </br>
          Compare and obtain the minimum records between (2024-04-10 to 2024-04-25) and 1000. If (2024-04-10 to 2024-04-25) contains 360 records. Then fetch the minimum between 360 and 1000 records only.

        - `&numRows=2024-04-10&toDate=2024-04-25` </br>
          If (2024-04-10 to 2024-04-25) contains 360 records. Then fetch 360 records only.

        - `&numRows=1000` </br>
          Fetch maximum 1000 records starting from Now to a historical date

        - `<blank>` </br>
          Fetch maximum 8760 records starting from Now to a historical date
      parameters:
        - name: fromDate
          in: query
          description: If empty, will only fetch records by numRows value.
          required: false
          schema:
            type: string
            format: date
        - name: toDate
          in: query
          description: If empty, will only fetch records by numRows value.
          required: false
          schema:
            type: string
            format: date
        - name: numRows
          in: query
          description: If empty, default value '8760'
          required: false
          schema:
            type: integer
        - $ref: '#/components/parameters/apiKeyAuth'
        - $ref: '#/components/parameters/signatureAuth'
        - $ref: '#/components/parameters/payloadAuth'
        - $ref: '#/components/parameters/contentType'
        - $ref: '#/components/parameters/contentLength'
        - $ref: '#/components/parameters/cacheControl'
        
      security:
        - apiKeyAuth: []
          signatureAuth: []
          payloadAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - request
                - nonce
              properties:
                request:
                  type: string
                  description: The API endpoint path
                  example: /v1/perpetuals/fundingpaymentreport/records.json?fromDate=2024-04-10&toDate=2024-04-25&numRows=1000
                nonce:
                  type: TimestampType
                  $ref: '#/components/schemas/TimestampType'
                  title: The nonce, as described in [Private API Invocation](/authentication/api-key#private-api-invocation)
                account:
                  type: string
                  description: "Required for Master API keys as described in [Private API Invocation](/authentication/api-key#private-api-invocation). The name of the account within the subaccount group. Specifies the account on which you intend to place the order. Only available for exchange accounts."
                  example: primary
            example:
              request: "/v1/perpetuals/fundingpaymentreport/records.json?fromDate=2024-04-10&toDate=2024-04-25&numRows=1000"
              nonce: <nonce>
      responses:
        '200':
          description: JSON response containing funding payment report.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FundingPaymentReportItem'
              example:
                - eventType: "Hourly Funding Transfer"
                  timestamp: 1713344403617
                  assetCode: "GUSD"
                  action: "Credit"
                  quantity:
                    currency: "GUSD"
                    value: "35.81084"
                  instrumentSymbol: "BTCGUSDPERP"
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalError'

