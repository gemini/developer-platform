  /v1/orders/history:
    post:
      x-zudoku-playground-enabled: false
      tags:
        - Orders
      summary: List Past Orders
      operationId: listPastOrders
      description: |
        This API retrieves (closed) orders history for an account.

        ### Roles
        The API key you use to access this endpoint must have the Trader or Auditor role assigned. See [Roles](/roles#roles) for more information.

        The OAuth scope must have `history:read` assigned to access this endpoint. See [OAuth Scopes](/authentication/oauth#oauth-scopes) for more information.


        ### How to retrieve your order history

        To retrieve your full order history walking backwards,

        1. Initial request: `POST` to https://api.gemini.com/v1/orders/history with a JSON payload including a `timestamp` key with value `0` and a `limit_orders` key with value `500`
        2. When you receive the list of orders, it will be sorted by `timestamp` descending - so the first element in the list will have the highest `timestamp` value. For this example, say that value is `X`.
        3. Create a second `POST` request with a JSON payload including a `timestamp` key with value `X+1` and a `limit_orders` key with value `500`.
        4. Take the first element of the list returned with highest `timestamp` value `Y` and create a third `POST` request with a JSON payload including a `timestamp` key with value `Y+1` and a `limit_orders` key with value `500`.
        5. Continue creating `POST` requests and retrieving orders until an empty list is returned.

        ### Break Types

        In the rare event that a trade has been reversed (broken), the trade that is broken will have this flag set. The field will contain one of these values

        |Value|Description|
        |--- |--- |
        |manual|The trade was reversed manually.  This means that all fees, proceeds, and debits associated with the trade have been credited or debited to the account seperately.  That means that this reported trade must be included for order for the account balance to be correct.|
        |full|The trade was fully broken.  The reported trade should not be accounted for.  It will be as though the transfer of fund associated with the trade had simply not happened.|

      parameters:
        - $ref: '#/components/parameters/apiKeyAuth'
        - $ref: '#/components/parameters/signatureAuth'
        - $ref: '#/components/parameters/payloadAuth'
        - $ref: '#/components/parameters/contentType'
        - $ref: '#/components/parameters/contentLength'
        - $ref: '#/components/parameters/cacheControl'
        
      security:
        - apiKeyAuth: []
          signatureAuth: []
          payloadAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - request
                - nonce
              properties:
                request:
                  type: string
                  description: The API endpoint `/v1/orders/history`
                nonce:
                  $ref: '#/components/schemas/Nonce'
                symbol:
                  type: string
                  description: "The symbol to retrieve orders for"
                limit_orders:
                  type: integer
                  description: "The maximum number of orders to return. Default is 50, max is 500."
                  default: 50
                timestamp:
                  title: '#/components/schemas/TimestampType'
                  description: "In iso datetime with timezone format from that date you will get order history"
                  allOf:
                    - $ref: '#/components/schemas/TimestampType'
                account:
                  type: string
                  description: "Required for Master API keys as described in [Private API Invocation](/authentication/api-key#private-api-invocation). The name of the account within the subaccount group."
            examples:
              basic:
                summary: Basic Request
                description: Basic request to get order history
                value:
                  request: /v1/orders/history
                  nonce: <nonce>
                  limit_orders: 50
              withSymbolAndTimestamp:
                summary: With Symbol and Timestamp
                description: Request with symbol and timestamp filters
                value:
                  request: /v1/orders/history
                  nonce: <nonce>
                  symbol: btcusd
                  timestamp: 1591084414000
                  limit_orders: 50
              withAccount:
                summary: With Account Parameter
                description: Request with account parameter for Master API keys
                value:
                  request: /v1/orders/history
                  nonce: <nonce>
                  account: primary
                  limit_orders: 100
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Order'
              examples:
                cancelledOrder:
                  summary: Cancelled Order
                  description: Response with a cancelled order
                  value:
                    - order_id: "73751560172006688"
                      id: "73751560172006688"
                      symbol: "ethgusd"
                      exchange: "gemini"
                      avg_execution_price: "0.00"
                      side: "buy"
                      type: "exchange limit"
                      timestamp: "1695629298"
                      timestampms: 1695629298505
                      is_live: false
                      is_cancelled: true
                      is_hidden: false
                      was_forced: false
                      executed_amount: "0"
                      client_order_id: "fb5321b0-2114-47fd-8cca-531a66d7feaf"
                      options: []
                      price: "420.00"
                      original_amount: "0.69"
                      remaining_amount: "0.69"
                      trades: []
                completedOrder:
                  summary: Completed Order
                  description: Response with a completed order
                  value:
                    - order_id: "107421205"
                      id: "107421205"
                      symbol: "btcusd"
                      exchange: "gemini"
                      avg_execution_price: "3633.00"
                      side: "buy"
                      type: "exchange limit"
                      timestamp: "1547241626"
                      timestampms: 1547241626991
                      is_live: false
                      is_cancelled: false
                      is_hidden: false
                      was_forced: false
                      executed_amount: "5"
                      remaining_amount: "0"
                      options: []
                      price: "3633.00"
                      original_amount: "5"
                      trades: [
                        {
                          price: "3633.00",
                          amount: "5",
                          timestamp: 1547241627,
                          timestampms: 1547241627000,
                          type: "Buy",
                          aggressor: true,
                          fee_currency: "USD",
                          fee_amount: "9.0825",
                          tid: 106921823,
                          order_id: "107421205",
                          exchange: "gemini"
                        }
                      ]
                emptyHistory:
                  summary: Empty History
                  description: Response when there are no orders in history
                  value: []
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/ApiKeyIpFilteringFailure'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalError'

