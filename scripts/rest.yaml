                symbols: [ "PNUTGUSDPERP",
                  "WIFGUSDPERP",
                  "PYTHGUSDPERP",
                  "MEWGUSDPERP",
                  "BONKGUSDPERP",
                  "BCHGUSDPERP",
                  "BTCGUSDPERP",
                  "BUSDUSD",
                  "POLGUSDPERP",
                  "FRAXUSD",
                  "OPGUSDPERP",
                  "DOTGUSDPERP",
                  "TRUMPGUSDPERP",
                  "GUSDGBP",
                  "USDTUSD",
                  "POPCATGUSDPERP",
                  "FLOKIGUSDPERP",
                  "MOODENGGUSDPERP",
                  "LINKGUSDPERP",
                  "ETHGUSDPERP",
                  "UNIGUSDPERP",
                  "MATICGUSDPERP",
                  "USDTGUSD",
                  "BNBGUSDPERP",
                  "MIMUSD",
                  "KSL2GUSDPERP",
                  "LUSDUSD",
                  "SHIBGUSDPERP",
                  "AVAXGUSDPERP",
                  "BOMEGUSDPERP",
                  "USDCUSD",
                  "HYPEGUSDPERP",
                  "MOGGUSDPERP",
                  "KT5GUSDPERP",
                  "SOLGUSDPERP",
                  "PEPEGUSDPERP",
                  "DOGEGUSDPERP",
                  "GUSDSGD",
                  "INJGUSDPERP",
                  "LTCGUSDPERP",
                  "XRPGUSDPERP",
                  "USTUSD",
                  "GOATGUSDPERP",
                  "DAIUSD"
                ]
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
