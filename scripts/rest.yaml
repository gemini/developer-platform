  /v1/clearing/broker/new:
    post:
      x-zudoku-playground-enabled: false
      tags:
        - Clearing
      summary: Create New Broker Order
      operationId: createNewBrokerOrder
      description: |
        Gemini Clearing also allows for brokers to facilitate trades between two Gemini customers. A broker can submit a new Gemini Clearing order that must then be confirmed by each counterparty before settlement.
      parameters:
        - $ref: '#/components/parameters/apiKeyAuth'
        - $ref: '#/components/parameters/signatureAuth'
        - $ref: '#/components/parameters/payloadAuth'
        - $ref: '#/components/parameters/contentType'
        - $ref: '#/components/parameters/contentLength'
        - $ref: '#/components/parameters/cacheControl'
        
      security:
        - apiKeyAuth: []
          signatureAuth: []
          payloadAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - request
                - nonce
                - source_counterparty_id
                - target_counterparty_id
                - symbol
                - amount
                - expires_in_hrs
                - price
                - side
              properties:
                request:
                  type: string
                  description: The literal string "/v1/clearing/broker/new"
                nonce:
                  $ref: '#/components/schemas/Nonce'
                source_counterparty_id:
                  type: string
                  description: A symbol that corresponds with the counterparty sourcing the clearing trade
                target_counterparty_id:
                  type: string
                  description: A symbol that corresponds with the counterparty where the clearing trade is targeted
                symbol:
                  type: string
                  description: The [symbol](/market-data/symbols-and-minimums) of the order
                amount:
                  type: string
                  format: decimal
                  description: Quoted decimal amount to purchase
                expires_in_hrs:
                  type: integer
                  format: float
                  description: The number of hours before the trade expires. Your counterparty will need to confirm the order before this time expires.
                price:
                  type: string
                  format: decimal
                  description: Quoted decimal amount to spend per unit
                side:
                  type: string
                  enum: [buy, sell]
                  description: |
                    "buy" or "sell". This side will be assigned to the `source_counterparty_id`. The opposite side will be sent to the `target_counterparty_id`
                account:
                  type: string
                  description: Required for Master API keys as described in [Private API Invocation](/authentication/api-key#private-api-invocation). The name of the account within the subaccount group. Specifies the broker account on which to place the order. Only available for exchange accounts.
            examples:
              brokerOrderInitiation:
                summary: Broker order initiation sample
                description: Sample payload for broker order initiation
                value:
                  request: "/v1/clearing/broker/new"
                  nonce: <nonce>
                  source_counterparty_id: R485E04Q
                  target_counterparty_id: Z4929ZDY
                  symbol: ethusd
                  amount: "175.00"
                  expires_in_hrs: 1.0
                  price: "200"
                  side: sell
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: string
                    description: Will return `AwaitSourceTargetConfirm`, meaning the order is waiting for both the source and the target parties to confirm the order
                  clearing_id:
                    type: string
                    description: A unique identifier for the clearing order.
              example: {
                result: AwaitSourceTargetConfirm,
                clearing_id: "8EM7NVXD"
              }
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/ApiKeyIpFilteringFailure'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalError'
  
