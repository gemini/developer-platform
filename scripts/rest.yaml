      security:
        - apiKeyAuth: []
          signatureAuth: []
          payloadAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - request
                - side
                - symbol
                - nonce
                - totalSpend
              properties:
                request:
                  type: string
                  description: The literal string "/v1/instant/quote/"
                side:
                  type: string
                  enum: [buy, sell]
                  description: '"buy" or "sell"'
