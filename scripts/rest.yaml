  /v2/transfers:
    post:
      x-zudoku-playground-enabled: false
      tags:
        - Fund Management
      summary: List Past Transfers
      operationId: listPastTransfersV2
      description: |
        <div class="p-4 text-sm section-icon section-info rounded-sm" role="alert">
          <div class="flex">
             <svg
                view-box="0 0 24 24"
              >
                <path
                  fill-rule="evenodd"
                  clip-rule="evenodd"
                  d="M4 12C4 7.58172 7.58172 4 12 4C16.4183 4 20 7.58172 20 12C20 16.4183 16.4183 20 12 20C7.58172 20 4 16.4183 4 12ZM12 2C6.47715 2 2 6.47715 2 12C2 17.5228 6.47715 22 12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2ZM11 17V11H13V17H11ZM11 9V7H13V9H11Z"
                />
              </svg>
              The v1 transfers endpoint is being retired. This v2 endpoint is the recommended replacement, offering full multichain support with accurate status for all supported networks. Please migrate to this endpoint at your earliest convenience.
          </div>
        </div>

        This endpoint shows deposits and withdrawals in supported currencies with full multichain (multi-network) support. It returns accurate status information for transfers on **all supported networks** including Solana, Arbitrum, Optimism, Base, Avalanche, and Ethereum.

        Each transfer in the response includes a `network` field identifying the blockchain network, along with network-specific `feeAmount`, `feeCurrency`, and `txHash` values.

        This endpoint does not currently show cancelled advances, returned outgoing wires or ACH transactions, or other exceptional transaction circumstances.

        Fiat transfers between non-derivative and derivatives accounts are prohibited.

        ### Roles
        The API key you use to access this endpoint must have the Trader, Fund Manager or Auditor role assigned. See [Roles](/roles#roles) for more information.

        The OAuth scope must have `history:read` assigned to access this endpoint. See [OAuth Scopes](/authentication/oauth#oauth-scopes) for more information.
      parameters:
        - $ref: '#/components/parameters/apiKeyAuth'
        - $ref: '#/components/parameters/signatureAuth'
        - $ref: '#/components/parameters/payloadAuth'
        - $ref: '#/components/parameters/contentType'
        - $ref: '#/components/parameters/contentLength'
        - $ref: '#/components/parameters/cacheControl'

      security:
        - apiKeyAuth: []
          signatureAuth: []
          payloadAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - request
                - nonce
              properties:
                request:
                  type: string
                  description: The literal string "/v2/transfers"
                nonce:
                  $ref: '#/components/schemas/Nonce'
                currency:
                  type: string
                  description: Currency code, see symbols and minimums
                network:
                  type: string
                  description: Filter transfers by blockchain network (e.g., `ethereum`, `solana`, `arbitrum`, `optimism`, `base`, `avalanche`)
                timestamp:
                  $ref: '#/components/schemas/TimestampType'
                  description: Only return transfers after this timestamp
                limit_transfers:
                  type: integer
                  description: The maximum number of transfers to return. The default is 10 and the maximum is 50.
                account:
                  type: string
                  description: Required for Master API keys. The name of the account within the subaccount group.
                show_completed_deposit_advances:
                  type: boolean
                  description: Whether to display completed deposit advances. True by default.
            examples:
              basic:
                summary: Basic Request
                description: Basic request to get all transfers across all networks
                value:
                  request: "/v2/transfers"
                  nonce: <nonce>
              withCurrency:
                summary: With Currency Filter
                description: Request with currency filter for USDC transfers
                value:
                  request: "/v2/transfers"
                  nonce: <nonce>
                  currency: "USDC"
              withNetwork:
                summary: With Network Filter
                description: Request filtered to a specific network
                value:
                  request: "/v2/transfers"
                  nonce: <nonce>
                  currency: "USDC"
                  network: "solana"
              withFilters:
                summary: With Multiple Filters
                description: Request with timestamp, limit, and account filters
                value:
                  request: "/v2/transfers"
                  nonce: <nonce>
                  timestamp: 1591084414000
                  limit_transfers: 25
                  account: "primary"
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/V2Transfer'
              examples:
                multiNetworkTransfers:
                  summary: Multi-Network Transfers
                  description: Response with transfers across different networks
                  value:
                    - type: "Withdrawal"
                      status: "Complete"
                      timestampms: 1772818620354
                      eid: 368598436530
                      currency: "USDC"
                      amount: "0.01"
                      network: "ethereum"
                      feeAmount: "0.118856"
                      feeCurrency: "USDC"
                      txHash: "714a15c4fd2d37629d27e56a63aaec5f91e0053dde3eb357be71663c1197b391"
                      destination: "0x83cFb8C13f06716b449E5D24F5b4cc6Cc64a189A"
                      withdrawalId: "69ab0b0f-3c76-433d-84a5-c8bcc6718411"
                    - type: "Withdrawal"
                      status: "Complete"
                      timestampms: 1772034480391
                      eid: 368474658614
                      currency: "USDC"
                      amount: "1799"
                      network: "solana"
                      feeAmount: "0.202536"
                      feeCurrency: "USDC"
                      txHash: "4vJ9JU1bJJE96FWSJKvHsmmFADCg4gpZQff4P3bkLKi"
                      withdrawalId: "9b7a5100-b3ee-4820-9b5b-c2dd7db6559b"
                    - type: "Deposit"
                      status: "Advanced"
                      timestampms: 1771990797452
                      eid: 309356152
                      currency: "ETH"
                      amount: "100"
                      network: "ethereum"
                      feeAmount: "0"
                      feeCurrency: "ETH"
                      txHash: "605c5fa8bf99458d24d61e09941bc443ddc44839d9aaa508b14b296c0c8269b2"
                adminTransactions:
                  summary: Administrative Transactions
                  description: Response with administrative credits and debits (no network field)
                  value:
