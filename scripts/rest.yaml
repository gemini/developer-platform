  /v2/candles/{symbol}/{time_frame}:
    get:
      tags:
        - Market Data
      summary: List Candles
      operationId: listCandles
      description: This endpoint retrieves time-intervaled data for the provided symbol.
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
          description: Trading pair symbol
          example: BTCUSD
        - name: time_frame
