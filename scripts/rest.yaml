          </div>
        </div>

        This will show the available balances in the supported currencies as well as the notional value in the currency specified.

        <div class="p-4 text-sm section-icon section-info rounded-sm" role="alert">
          <div class="flex">
             <svg
                view-box="0 0 24 24"
