  /v1/margin/order/preview:
    post:
      x-zudoku-playground-enabled: false
      tags:
        - Margin Trading
      summary: Preview Margin Order Impact
      operationId: previewMarginOrder
      description: |
        Previews the margin impact of a hypothetical spot order without actually placing it.

        Returns both pre-order and post-order margin risk statistics, allowing you to understand how an order would affect your margin account before execution. This is useful for risk management and planning trades.

        ### Roles
        The API key you use to access this endpoint must have the Trader or Auditor role assigned. See [Roles](/roles#roles) for more information.

        The OAuth scope must have `orders:read` assigned to access this endpoint. See [OAuth Scopes](/authentication/oauth#oauth-scopes) for more information.

        ### Account Type
        This endpoint is only available for margin trading accounts.
      parameters:
        - $ref: '#/components/parameters/apiKeyAuth'
        - $ref: '#/components/parameters/signatureAuth'
        - $ref: '#/components/parameters/payloadAuth'
        - $ref: '#/components/parameters/contentType'
        - $ref: '#/components/parameters/contentLength'
        - $ref: '#/components/parameters/cacheControl'

      security:
        - apiKeyAuth: []
          signatureAuth: []
          payloadAuth: []

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - request
                - nonce
                - symbol
                - side
                - type
              properties:
                request:
                  type: string
                  description: The literal string "/v1/margin/order/preview"
                nonce:
                  $ref: '#/components/schemas/Nonce'
                symbol:
                  type: string
                  description: The trading pair symbol (e.g., "btcusd")
                  example: "btcusd"
                side:
                  type: string
                  enum: [buy, sell]
                  description: The order side
                  example: "buy"
                type:
                  type: string
                  enum: [market, limit]
                  description: The order type
                  example: "limit"
                amount:
                  type: string
                  format: decimal
                  description: The order amount in base currency (required for limit orders and sell market orders)
                  example: "0.5"
                price:
                  type: string
                  format: decimal
                  description: The limit price (required for limit orders)
                  example: "50000.00"
                totalSpend:
                  type: string
                  format: decimal
                  description: Total spend in quote currency (required for buy market orders)
                  example: "25000.00"
                account:
                  type: string
                  description: "Required for Master API keys as described in [Private API Invocation](/authentication/api-key#private-api-invocation). The name of the account within the subaccount group."
            examples:
              limitBuy:
                summary: Limit Buy Order Preview
                description: Preview a limit buy order
                value:
                  request: "/v1/margin/order/preview"
                  nonce: <nonce>
                  symbol: "btcusd"
                  side: "buy"
                  type: "limit"
                  amount: "0.5"
                  price: "50000.00"
              marketBuy:
                summary: Market Buy Order Preview
                description: Preview a market buy order using total spend
                value:
                  request: "/v1/margin/order/preview"
                  nonce: <nonce>
                  symbol: "ethusd"
                  side: "buy"
                  type: "market"
                  totalSpend: "5000.00"
              marketSell:
                summary: Market Sell Order Preview
                description: Preview a market sell order
                value:
                  request: "/v1/margin/order/preview"
                  nonce: <nonce>
                  symbol: "btcusd"
                  side: "sell"
                  type: "market"
                  amount: "0.25"

      responses:
        '200':
          description: Pre-order and post-order margin risk statistics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarginOrderPreview'
              example:
                preorder:
                  marginAssetValue:
                    currency: "USD"
                    value: "10000.00"
                  availableCollateral:
                    currency: "USD"
                    value: "8500.00"
                  notionalValue:
                    currency: "USD"
                    value: "15000.00"
                  totalBorrowed:
                    currency: "USD"
                    value: "5000.00"
                  leverage: "1.5"
                  reservedBuyOrders:
                    currency: "USD"
                    value: "0.00"
                  reservedSellOrders:
                    currency: "USD"
                    value: "0.00"
                  buyingPower:
                    currency: "USD"
                    value: "8500.00"
                  sellingPower:
                    currency: "USD"
                    value: "8500.00"
                postorder:
                  marginAssetValue:
                    currency: "USD"
                    value: "10000.00"
                  availableCollateral:
                    currency: "USD"
                    value: "6000.00"
                  notionalValue:
                    currency: "USD"
                    value: "40000.00"
                  totalBorrowed:
                    currency: "USD"
                    value: "30000.00"
                  leverage: "4.0"
                  reservedBuyOrders:
                    currency: "USD"
                    value: "0.00"
                  reservedSellOrders:
                    currency: "USD"
                    value: "0.00"
                  buyingPower:
                    currency: "USD"
                    value: "6000.00"
                  sellingPower:
                    currency: "USD"
                    value: "6000.00"
                  liquidationRisk:
                    lossPercentage: "0.6000"
                    liquidationPrice:
                      currency: "USD"
                      value: "30000.00"
        '400':
          $ref: '#/components/responses/BadRequest'
